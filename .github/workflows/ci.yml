name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  terraform:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        root: [terraform/aws-storage, terraform/aws-compute]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform -chdir=${{ matrix.root }} fmt -check
      - run: terraform -chdir=${{ matrix.root }} init -backend=false -input=false
      - run: terraform -chdir=${{ matrix.root }} validate
